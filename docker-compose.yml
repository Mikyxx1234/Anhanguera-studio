services:
  api:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      
      # Configurações do Banco de Dados
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      
      # URL do Frontend (para validação de origem)
      FRONTEND_URL: ${FRONTEND_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


